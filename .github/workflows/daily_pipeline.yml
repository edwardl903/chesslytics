name: Daily Chesslytics Pipeline

on:
  # Run every day at 06:00 UTC (2am ET)
  schedule:
    - cron: "0 6 * * *"

  # Allow manual trigger from the GitHub Actions UI
  workflow_dispatch:
    inputs:
      usernames:
        description: "Space-separated usernames (blank = all tracked)"
        required: false
        default: ""
      dry_run:
        description: "Dry run (fetch only, skip BigQuery upload)"
        type: boolean
        default: false

jobs:
  ingest:
    name: Ingest Chess.com games → BigQuery
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run daily ingest
        env:
          GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON }}
        run: |
          # Build CLI args from workflow_dispatch inputs (empty = use defaults in script)
          ARGS=""
          if [ -n "${{ github.event.inputs.usernames }}" ]; then
            ARGS="${{ github.event.inputs.usernames }}"
          fi
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          python scripts/daily_ingest.py $ARGS

  dbt:
    name: dbt run + test
    runs-on: ubuntu-latest
    needs: ingest        # only run after ingest succeeds
    timeout-minutes: 20

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install Python + dbt dependencies
        run: |
          pip install -r requirements.txt
          pip install dbt-bigquery

      - name: Write dbt profiles.yml + service account key
        env:
          GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON }}
        run: |
          mkdir -p ~/.dbt

          # Use Python to write the JSON — avoids echo mangling special chars
          python3 - <<'PYEOF'
          import os, json, pathlib

          raw = os.environ["GOOGLE_APPLICATION_CREDENTIALS_JSON"].strip()
          info = json.loads(raw)                           # validates JSON early
          pathlib.Path("/tmp/sa.json").write_text(json.dumps(info))
          print(f"Wrote service account for project: {info.get('project_id')}")
          PYEOF

          cat > ~/.dbt/profiles.yml << 'EOF'
          chesslytics_dbt:
            target: ci
            outputs:
              ci:
                type: bigquery
                method: service-account
                project: crucial-decoder-462021-m4
                dataset: test1
                keyfile: /tmp/sa.json
                location: us-central1
                priority: interactive
                threads: 4
                timeout_seconds: 300
          EOF

      - name: dbt deps
        working-directory: chesslytics_dbt
        run: dbt deps

      - name: dbt seed (tracked_usernames)
        working-directory: chesslytics_dbt
        run: dbt seed

      - name: dbt snapshot (SCD2 dim_users history)
        working-directory: chesslytics_dbt
        run: dbt snapshot

      - name: dbt run (incremental models)
        working-directory: chesslytics_dbt
        run: dbt run

      - name: dbt test
        working-directory: chesslytics_dbt
        run: dbt test

      - name: Upload dbt artifacts
        if: always()   # upload even if tests fail, so you can inspect the run
        uses: actions/upload-artifact@v4
        with:
          name: dbt-artifacts-${{ github.run_id }}
          path: |
            chesslytics_dbt/target/manifest.json
            chesslytics_dbt/target/run_results.json
          retention-days: 30
