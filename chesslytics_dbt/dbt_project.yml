name: 'chesslytics_dbt'
version: '1.0.0'
config-version: 2

profile: 'chesslytics_dbt'

model-paths:    ["models"]
analysis-paths: ["analyses"]
test-paths:     ["tests"]
seed-paths:     ["seeds"]
macro-paths:    ["macros"]
snapshot-paths: ["snapshots"]

clean-targets:
  - "target"
  - "dbt_packages"

# ---------------------------------------------------------------------------
# Variables — override on CLI:  dbt run --vars '{"default_username": "hikaru"}'
# ---------------------------------------------------------------------------
vars:
  default_username: "EdwardL903"

# ---------------------------------------------------------------------------
# Seed config
# ---------------------------------------------------------------------------
seeds:
  chesslytics_dbt:
    tracked_usernames:
      +column_types:
        username:  STRING
        added_at:  DATE
        notes:     STRING

# ---------------------------------------------------------------------------
# Snapshot config
# ---------------------------------------------------------------------------
snapshots:
  chesslytics_dbt:
    +target_schema: test1

# ---------------------------------------------------------------------------
# Model config — layered by folder
# Naming convention:
#   sources     → declared in sources.yml (raw BigQuery tables)
#   staging     → stg_*   views, 1:1 with source, clean + rename only
#   intermediate → int_*  tables, business logic, player perspective
#   reporting   → fct_*/dim_*  tables, final shape for BI consumers
# ---------------------------------------------------------------------------
models:
  chesslytics_dbt:

    staging:
      +materialized: view
      +tags: ["staging", "daily"]
      +docs:
        show: true
      # Staging is "protected" — only intermediate should ref it
      +access: protected

    intermediate:
      +materialized: table
      +tags: ["intermediate", "daily"]
      +docs:
        show: true
      +access: protected

    reporting:
      +materialized: table
      +tags: ["reporting", "daily"]
      +docs:
        show: true
      # Reporting models are "public" — safe for BI tools and external refs
      +access: public
