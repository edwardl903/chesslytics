version: 2

models:
  - name: stg_raw_games
    description: >
      **Staging model** — cleaned and renamed view over the raw_games source table.
      One row per unique Chess.com game. Responsibilities: parse Unix end_time to
      timestamps and calendar fields, rename columns to consistent snake_case,
      filter rows missing primary keys (white/black username or uuid).
      No business logic, no player-perspective columns — those live in int_player_games.

    config:
      tags: ["staging", "daily"]
      materialized: view
      meta:
        layer: staging
        owner: edward_lai
        contains_pii: false
        sla: daily

    columns:
      - name: game_id
        description: UUID primary key from Chess.com API
        tests:
          - not_null
          - unique

      - name: game_url
        description: Full Chess.com game URL

      - name: game_end_timestamp
        description: Game end as TIMESTAMP (parsed from Unix end_time integer)
        tests:
          - not_null

      - name: game_date
        description: Game end as DATE
        tests:
          - not_null

      - name: game_year
        description: Calendar year (EXTRACT from game_date)
        tests:
          - not_null

      - name: game_month
        description: Calendar month 1–12

      - name: game_day
        description: Calendar day 1–31

      - name: game_hour
        description: Hour of game end (UTC, 0–23)

      - name: game_day_of_week
        description: Day of week (1=Sun … 7=Sat, BigQuery convention)

      - name: game_weekday_name
        description: Full weekday name (e.g. 'Monday')

      - name: raw_time_control
        description: Raw time control string from API (e.g. '600', '180+2')

      - name: time_class
        description: "Time control class: blitz | rapid | bullet | daily"
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['blitz', 'rapid', 'bullet', 'daily', 'correspondence']

      - name: rated
        description: Whether the game was rated (BOOLEAN)

      - name: pgn
        description: Full PGN string (kept raw for ECO parsing in intermediate)

      - name: final_fen
        description: Final board position FEN string

      - name: white_username
        description: White player Chess.com username
        tests:
          - not_null

      - name: white_rating
        description: White player rating at game start (INTEGER)

      - name: white_result
        description: White result string (win | resigned | timeout | checkmated | draw | stalemate | …)

      - name: white_accuracy
        description: White accuracy % (optional — absent for many games)

      - name: black_username
        description: Black player Chess.com username
        tests:
          - not_null

      - name: black_rating
        description: Black player rating at game start

      - name: black_result
        description: Black result string

      - name: black_accuracy
        description: Black accuracy % (optional)

      - name: uploaded_at
        description: Timestamp when this row was inserted into BigQuery by the ingest pipeline
        tests:
          - not_null

      - name: loaded_by_user
        description: Chess.com username that triggered the /generate request or daily ingest
